# event_rules.yaml - event consumer rules (v0.6.0 security hardening)
# Commands use exec+script format. Event data passed via EVENT_DATA env var.
# No string interpolation into shell commands — eliminates injection risk.

rules:

  - id: "rule-task-complete-audit"
    description: "task complete OK -> write audit to operation_log"
    match:
      event_type: task_complete
      result: OK
    action:
      type: bridge
      target: operation_log
      exec: "python"
      script: |
        import json, os, datetime
        event = json.loads(os.environ.get("EVENT_DATA", "{}"))
        data_dir = os.environ.get("DATA_DIR", ".")
        entry = {
            "t": datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).isoformat(),
            "level": "INFO",
            "actor": "event_consumer",
            "action": "task_complete_audit",
            "result": "OK",
            "detail": "audit for " + str(event.get("trace_id", "unknown")),
            "trace_id": str(event.get("trace_id", "unknown")),
        }
        with open(os.path.join(data_dir, "operation_log.jsonl"), "a", encoding="utf-8") as f:
            f.write(json.dumps(entry, ensure_ascii=False) + "\n")
    max_retries: 2
    rate_limit: 1.0

  - id: "rule-task-warn-degrade"
    description: "low confidence WARN -> degrade log"
    match:
      event_type: task_complete
      result: WARN
    action:
      type: escalate
      target: degrade_log
      exec: "python"
      script: |
        import json, os, datetime
        event = json.loads(os.environ.get("EVENT_DATA", "{}"))
        data_dir = os.environ.get("DATA_DIR", ".")
        entry = {
            "t": datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).isoformat(),
            "event_type": "task_complete",
            "result": "WARN",
            "producer": str(event.get("producer", "unknown")),
            "detail": str(event.get("detail", "")),
            "trace_id": str(event.get("trace_id", "unknown")),
        }
        with open(os.path.join(data_dir, "degrade_events.log"), "a", encoding="utf-8") as f:
            f.write(json.dumps(entry, ensure_ascii=False) + "\n")
    max_retries: 2
    rate_limit: 0.5

