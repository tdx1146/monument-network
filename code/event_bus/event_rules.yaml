# event_rules.yaml - event consumer rules
# v0.5.0 - rewrite: fix ghost script refs, add missing rules, parameterize paths

rules:

  - id: "rule-task-complete-audit"
    description: "task complete OK -> write audit to operation_log"
    match:
      event_type: task_complete
      result: OK
    action:
      type: bridge
      target: operation_log
      command: >-
        python3 -c "import json,datetime;f=open('{DATA_DIR}/operation_log.jsonl','a',encoding='utf-8');f.write(json.dumps({'t':datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).isoformat(),'level':'INFO','actor':'event_consumer','action':'task_complete_audit','result':'OK','detail':'audit for {trace_id}','trace_id':'{trace_id}'},ensure_ascii=False)+'\n';f.close()"
    max_retries: 2
    rate_limit: 1.0

  - id: "rule-task-warn-degrade"
    description: "low confidence WARN -> degrade log"
    match:
      event_type: task_complete
      result: WARN
    action:
      type: escalate
      target: degrade_log
      command: >-
        python3 -c "import json,datetime;f=open('{DATA_DIR}/degrade_events.log','a',encoding='utf-8');f.write(json.dumps({'t':datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).isoformat(),'event_type':'task_complete','result':'WARN','producer':'{producer}','detail':'{detail}','trace_id':'{trace_id}'},ensure_ascii=False)+'\n';f.close()"
    max_retries: 2
    rate_limit: 0.5

  - id: "rule-milestone-archive"
    description: "milestone -> archive to milestone_archive.jsonl"
    match:
      event_type: milestone
      result: OK
    action:
      type: archive
      target: milestone_archive
      command: >-
        python3 -c "import json,datetime;f=open('{DATA_DIR}/milestone_archive.jsonl','a',encoding='utf-8');f.write(json.dumps({'t':datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=8))).isoformat(),'event_type':'milestone','producer':'{producer}','detail':'{detail}','trace_id':'{trace_id}'},ensure_ascii=False)+'\n';f.close()"
    max_retries: 2
    rate_limit: 2.0

  - id: "rule-anomaly-escalate"
    description: "anomaly FAIL -> alert"
    match:
      event_type: anomaly
      result: FAIL
    action:
      type: escalate
      target: alert_channel
      command: >-
        python3 -c "f=open('{DATA_DIR}/alerts.log','a',encoding='utf-8');f.write('[ALERT] '+__import__('datetime').datetime.now().isoformat()+' anomaly: {detail} (trace={trace_id})\n');f.close()"
    max_retries: 2
    rate_limit: 5.0

  - id: "rule-consumer-ok-health"
    description: "consumer action OK -> health noop"
    match:
      event_type: consumer_action
      result: OK
    action:
      type: bridge
      target: health_log
      command: "python3 -c pass"
    max_retries: 1
    rate_limit: 10.0
